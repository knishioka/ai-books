# Supabase local development config for ai-books.
#
# Equivalent to `supabase init` output, pinned and hand-maintained so the local
# stack is reproducible from this repo alone. `supabase start` reads this file to
# bring up Postgres + Studio on Docker; `supabase stop` tears it down.
#
# Local-only. Secrets never live here — runtime connection values come from
# AI_BOOKS_DB_URL / SUPABASE_* env vars (see ../.env.example). Keep db.major_version
# in lockstep with the Postgres image used in CI (.github/workflows/ci.yml).

project_id = "ai-books"

[api]
enabled = true
# Port for the local API (PostgREST / GraphQL) served by `supabase start`.
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
# Port for the local Postgres database. This is the port in the local
# AI_BOOKS_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
port = 54322
# Port used by `supabase db diff` for the shadow database.
shadow_port = 54320
# Postgres major version. Keep in sync with the CI service container.
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
# Port for the local Supabase Studio (read-only inspection during dev).
port = 54323
api_url = "http://127.0.0.1"

# Local email testing server. Captures outbound mail during dev so nothing is
# sent externally.
[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[analytics]
enabled = false
