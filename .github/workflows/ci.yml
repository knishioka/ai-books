name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    # Postgres service so pytest runs against a real DB (matches the local
    # `supabase start` Postgres; keep major version in sync with
    # supabase/config.toml db.major_version). The DB smoke test in
    # tests/test_db.py runs only when AI_BOOKS_DB_URL is set (below); it skips
    # locally so `./scripts/verify.sh` stays green without a live DB.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_books_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      AI_BOOKS_DB_URL: postgresql://postgres:postgres@localhost:5432/ai_books_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      # AI_BOOKS_DB_URL is set (Postgres service above), so verify.sh runs the DB-backed
      # tests AND enforces the coverage gate (line 80 / branch 70 — AGENTS.md / #58) via
      # scripts/check_coverage.py. It also writes coverage.xml + coverage.json.
      - name: Run verify.sh
        run: bash scripts/verify.sh

      # Coverage reports as artifacts (#58). `if: always()` so they survive a gate failure
      # for inspection. Per-Python-version names avoid matrix upload collisions.
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-python-${{ matrix.python-version }}
          path: |
            coverage.xml
            coverage.json
          if-no-files-found: warn

  web:
    name: Web viewer (lint / typecheck / unit / build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Fast DB-free unit layer (#55): pins lib/reports, lib/etax and money/format
      # 符号則・境界・端数・検証 edge cases in milliseconds, complementing the heavier
      # golden cross-check (web-golden) which stays the source of truth for end-to-end numbers.
      # test:coverage runs the same unit layer under v8 coverage and FAILS if the data
      # layer drops below the AGENTS.md targets (line 80 / branch 70), configured in
      # vitest.config.ts (#58). Writes coverage/ (html + coverage-summary.json).
      - name: Unit tests + coverage gate (vitest)
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-web
          path: web/coverage
          if-no-files-found: warn

      - name: Build
        run: npm run build

  web-vercel-build:
    name: Web viewer Vercel parity build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Vercel is configured with Root Directory=web, so production builds cannot
      # reach files outside web/. Run the same build from an isolated copy of web/
      # to catch regressions such as `../src` fs reads that pass in a full-repo CI
      # checkout but fail on Vercel.
      - name: Build isolated web root
        run: bash scripts/verify_web_vercel_build.sh

  web-golden:
    name: Web viewer golden cross-check
    runs-on: ubuntu-latest
    # Asserts the viewer's data layer (lib/reports/*, lib/etax/*) reproduces the
    # Python report layer's golden snapshots (#17) byte-for-byte: seed the synthetic
    # FY2025 fixture into a real Postgres through the production write path, then run
    # web/scripts/verify-golden.ts against the committed golden/*.json. This makes
    # "表示数値が MCP/レポート層の出力と一致" (#25 AC) a hard gate on every PR.
    # Postgres major version kept in sync with the `verify` job / supabase config.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_books_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      AI_BOOKS_DB_URL: postgresql://postgres:postgres@localhost:5432/ai_books_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      # Apply every migration and load the FY2025 fixture through the production
      # JournalRepository write path (PYTHONPATH=. so the tests.fixtures seed loader
      # imports from the repo root).
      - name: Migrate + seed FY2025 fixture
        run: PYTHONPATH=. uv run python scripts/seed_verify_db.py

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Golden cross-check
        run: npm run verify:golden
        working-directory: web

  pooler:
    name: Supabase pooler (pgbouncer) safety
    runs-on: ubuntu-latest
    # Reproduce Supabase's production pooler (pgbouncer, transaction mode) in front of
    # Postgres and run the migrate + seed write path, the Python pooler safety suite
    # (tests/test_pooler_db.py) and the viewer golden cross-check THROUGH it. This makes
    # "全クエリが pooler 越しに成功 / golden が pooler 経由でも一致" (#52) a hard gate, and a
    # regression that re-enables prepared statements fails here. Postgres major version
    # kept in sync with the other jobs / supabase config.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_books_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Everything talks to pgbouncer (host port 6432), never the direct Postgres (5432).
      AI_BOOKS_DB_URL: postgresql://postgres:postgres@127.0.0.1:6432/ai_books_test
      AI_BOOKS_POOLER_URL: postgresql://postgres:postgres@127.0.0.1:6432/ai_books_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start pgbouncer (transaction pooler) in front of Postgres
        run: |
          set -euo pipefail
          # The job runs on the host, so the `postgres` service is reachable at
          # localhost:5432; from inside the pgbouncer container that host is
          # host.docker.internal (host-gateway). pgbouncer listens on its in-container
          # 5432, published to the host as 6432 so it sits beside the direct Postgres.
          # Pin the version and disable prepared statements (+ DISCARD ALL on release)
          # so the "no prepared statements across transactions" restriction is explicit.
          docker run -d --name pgbouncer \
            --add-host=host.docker.internal:host-gateway \
            -p 6432:5432 \
            -e DB_HOST=host.docker.internal -e DB_PORT=5432 \
            -e DB_USER=postgres -e DB_PASSWORD=postgres -e DB_NAME=ai_books_test \
            -e POOL_MODE=transaction -e AUTH_TYPE=scram-sha-256 \
            -e MAX_PREPARED_STATEMENTS=0 \
            -e SERVER_RESET_QUERY="DISCARD ALL" -e SERVER_RESET_QUERY_ALWAYS=1 \
            edoburu/pgbouncer:v1.25.1-p0
          for _ in $(seq 1 30); do
            if docker exec pgbouncer pg_isready -h 127.0.0.1 -p 5432 -U postgres > /dev/null 2>&1; then
              echo "pgbouncer ready"
              exit 0
            fi
            sleep 1
          done
          echo "error: pgbouncer did not become ready" >&2
          docker logs pgbouncer || true
          exit 1

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      # Migrate + seed the FY2025 fixture through the pooler (exercises the production
      # write path over pgbouncer; PYTHONPATH=. so the tests.fixtures seed loader imports
      # from the repo root).
      - name: Migrate + seed FY2025 fixture (through pooler)
        run: PYTHONPATH=. uv run python scripts/seed_verify_db.py --fy2025-only

      - name: Python pooler safety suite (through pooler)
        run: uv run pytest -q tests/test_pooler_db.py

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Seed public sample fixtures (through pooler)
        run: PYTHONPATH=. uv run python scripts/seed_verify_db.py

      - name: Golden cross-check (through pooler)
        run: npm run verify:golden
        working-directory: web

  etax-xsd:
    name: e-Tax .xtx official XSD validation
    runs-on: ubuntu-latest
    # Fetch the official 国税庁 所得税関係 .xsd (checksum-verified, NOT committed — 著作物) and run the
    # .xtx schema-validation suite so "生成 .xtx が .xsd 検証を pass / 形式不正を機械検出" (#79) is a hard
    # gate on every PR. The tests skip when the .xsd is absent (so verify / test.sh stay green without
    # a fetch); this job is where they actually run. Also regenerates the committed 様式 layouts
    # (KOA210/KOA220/KOA240) from the fetched .xsd and fails on drift (renderer nesting must track 様式).
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      # Cache the fetched CAB archives so the government download (and SHA256 verify) only runs when
      # manifest.json changes — fewer hits on the e-Tax server, less flakiness.
      - name: Cache e-Tax spec archives
        uses: actions/cache@v4
        with:
          path: .cache/etax
          key: etax-spec-${{ hashFiles('docs/etax/manifest.json') }}

      - name: Fetch + verify official e-Tax .xsd
        run: uv run python scripts/etax/fetch_etax_spec.py --out .cache/etax

      - name: Assert committed 様式 layouts match the official .xsd (no drift)
        run: |
          set -euo pipefail
          for form in KOA210-011 KOA220-008 KOA240-008; do
            id="${form%%-*}"
            uv run python scripts/etax/build_etax_layout.py \
              --xsd ".cache/etax/extracted/${form}.xsd" \
              --out "/tmp/${id,,}_layout.json"
            diff -u "src/ai_books/etax/${id,,}_layout.json" "/tmp/${id,,}_layout.json"
          done

      - name: Run .xtx XSD validation suite
        run: PYTHONPATH=. uv run pytest -q tests/test_etax_xtx.py

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        run: uv run pre-commit run --all-files --show-diff-on-failure

  gitleaks:
    name: Secret scan (full git history)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # gitleaks needs the full history to detect secrets in past commits
          # that may have been removed from the working tree.
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
          # Pinned SHA256 for gitleaks_8.30.1_linux_x64.tar.gz, taken from the
          # upstream checksums.txt:
          # https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_checksums.txt
          # Bump in lockstep with GITLEAKS_VERSION and `.pre-commit-config.yaml`.
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          set -euo pipefail
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL --retry 3 -o "${tarball}" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}"
          echo "${GITLEAKS_SHA256}  ${tarball}" | sha256sum --check --strict
          sudo tar -xz -C /usr/local/bin -f "${tarball}" gitleaks
          rm -f "${tarball}"
          gitleaks version

      - name: Scan repository
        run: gitleaks detect --redact --verbose --exit-code 1 --config .gitleaks.toml
